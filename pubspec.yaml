name: glasswave
description: "GlassWave — glassmorphism notes app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  shared_preferences: ^2.2.3
  lucide_icons_flutter: ^3.1.15
  google_fonts: ^8.1.0
  intl: ^0.20.2
  flutter_staggered_grid_view: ^0.7.0
  flutter_markdown: ^0.7.3+1
  easy_localization: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
