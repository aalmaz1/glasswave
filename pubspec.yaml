name: premium_notes
description: A premium glassmorphism notes application with 12 themes.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State management
  provider: ^6.1.1

  # Local storage
  shared_preferences: ^2.2.2
  
  # Date formatting
  intl: ^0.18.1
  
  # UI utilities
  flutter_staggered_grid_view: ^0.7.0
  uuid: ^4.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
