<!DOCTYPE html>
<html>
<head>
  <!-- This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="premium_notes">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>premium_notes</title>
  <link rel="manifest" href="manifest.json">
  <style>
    /* Ensure the Flutter glass pane expands to fill the viewport */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    flutter-view, flt-glass-pane {
      display: block !important;
      width: 100% !important;
      height: 100% !important;
      position: absolute !important;
      top: 0;
      left: 0;
    }
    /* Fix for console spam - suppress pointer events on glass pane during init */
    flt-scene-host {
      pointer-events: auto !important;
    }
  </style>
</head>
<body>
  <script>
    // Suppress console spam from Flutter web initialization
    const originalWarn = console.warn;
    const originalError = console.error;
    console.warn = function(...args) {
      const msg = args[0]?.toString() || '';
      // Filter out known Flutter web initialization warnings
      if (msg.includes('PointerEvent') || 
          msg.includes('platform views') || 
          msg.includes('experimental')) {
        return;
      }
      originalWarn.apply(console, args);
    };
    console.error = function(...args) {
      const msg = args[0]?.toString() || '';
      // Filter out known Flutter web initialization errors that are harmless
      if (msg.includes('Failed to load') || 
          msg.includes('404') ||
          msg.includes('CanvasKit')) {
        return;
      }
      originalError.apply(console, args);
    };
  </script>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
